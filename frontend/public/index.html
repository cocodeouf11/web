<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0055FF" />
        <meta name="description" content="Soizic - Plateforme de signature de devis" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <title>Soizic — Signature de devis</title>
        <script>
          // Suppress benign DataCloneError + ResizeObserver warnings
          (function(){
            window.addEventListener("error", function(e){
              if (!e) return;
              if (e.error instanceof DOMException && e.error.name === "DataCloneError" && e.message && e.message.indexOf("PerformanceServerTiming") !== -1) {
                e.stopImmediatePropagation(); e.preventDefault(); return false;
              }
              if (e.message && e.message.indexOf("ResizeObserver loop") !== -1) {
                e.stopImmediatePropagation(); e.preventDefault(); return false;
              }
            }, true);
            window.addEventListener("unhandledrejection", function(e){
              if (e && e.reason && typeof e.reason.message === "string" && e.reason.message.indexOf("ResizeObserver loop") !== -1) {
                e.stopImmediatePropagation(); e.preventDefault();
              }
            });
          })();
        </script>
    </head>
    <body>
        <noscript>Vous devez activer JavaScript pour utiliser cette application.</noscript>
        <div id="root"></div>
    </body>
</html>
